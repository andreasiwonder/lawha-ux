async function deriveKey(pw){
  const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2',salt:b64(SALT),iterations:ITER,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
}
async function open(pw){
  const key=await deriveKey(pw);
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(IV)},key,b64(CT));
  return new TextDecoder().decode(pt);
}
async function tryOpen(pw,remember){
  const go=document.getElementById('go');go.disabled=true;
  try{
    const html=await open(pw);
    if(remember)try{sessionStorage.setItem('lawha_pw',pw)}catch(e){}
    document.open();document.write(html);document.close();
  }catch(e){
    document.getElementById('err').textContent='Wrong password. Please try again.';
    go.disabled=false;try{sessionStorage.removeItem('lawha_pw')}catch(e){}
  }
}
document.getElementById('f').addEventListener('submit',e=>{e.preventDefault();const pw=document.getElementById('pw').value;if(pw)tryOpen(pw,true);});
(async()=>{let s=null;try{s=sessionStorage.getItem('lawha_pw')}catch(e){}
